<!doctype html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover" />
  <title>AI শিক্ষক - Study With Keshab</title>
  <meta name="description" content="Study With Keshab - AI শিক্ষক: যেকোনো প্রশ্নের সহজ ভাষায় ধাপে ধাপে উত্তর" />
  <meta property="og:title" content="AI শিক্ষক - Study With Keshab" />
  <meta property="og:description" content="AI শিক্ষক: যেকোনো প্রশ্নের সহজ ভাষায় ধাপে ধাপে উত্তর" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-192x192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/navigation.css" />
  <link rel="stylesheet" href="css/ai-teacher.css" />
</head>
<body>
  <div id="navigation-placeholder"></div>

  <main class="ai-teacher-page">
    <div class="ai-teacher-container">
      <!-- HEADER - Compact Single Line -->
      <header class="ai-teacher-header">
        <div class="ai-teacher-header-icon">
          <i class="fas fa-chalkboard-teacher"></i>
        </div>
        <div class="ai-teacher-header-text">
          <h2>AI শিক্ষক</h2>
        </div>
        <div class="subject-selector">
          <select id="ai-teacher-subject" class="subject-select">
            <option value="general">সাধারণ</option>
            <option value="physics">পদার্থবিদ্যা</option>
            <option value="chemistry">রসায়ন</option>
            <option value="math">গণিত</option>
            <option value="biology">জীববিজ্ঞান</option>
            <option value="history">ইতিহাস</option>
            <option value="geography">ভূগোল</option>
            <option value="gk">সাধারণ জ্ঞান</option>
          </select>
        </div>
        <div class="ai-teacher-header-actions">
          <a href="index.html" class="header-btn" title="হোম"><i class="fas fa-home"></i></a>
          <button id="ai-teacher-new-chat" class="header-btn" title="নতুন চ্যাট">
            <i class="fas fa-plus"></i>
          </button>
          <button id="ai-teacher-history" class="header-btn" title="ইতিহাস">
            <i class="fas fa-history"></i>
          </button>
          <button id="ai-teacher-theme" class="header-btn" title="ডার্ক মোড">
            <i class="fas fa-moon"></i>
          </button>
          <button id="ai-teacher-clear" class="header-btn" title="মুছুন">
            <i class="fas fa-trash-alt"></i>
          </button>
        </div>
      </header>

      <!-- MESSAGES -->
      <div id="ai-teacher-messages" class="ai-teacher-messages"></div>

      <!-- PRESET ACTIONS -->
      <div id="preset-actions" class="preset-actions">
        <button class="preset-btn" data-preset="mcq" onclick="applyPreset('mcq')" title="MCQ তৈরি"><i class="fas fa-list-check"></i> MCQ</button>
        <button class="preset-btn" data-preset="example" onclick="applyPreset('example')" title="উদাহরণ"><i class="fas fa-lightbulb"></i> উদাহরণ</button>
        <button class="preset-btn" data-preset="simplify" onclick="applyPreset('simplify')" title="সহজভাবে"><i class="fas fa-child-reaching"></i> সহজভাবে</button>
        <button class="preset-btn" data-preset="summary" onclick="applyPreset('summary')" title="সারাংশ"><i class="fas fa-compress"></i> সারাংশ</button>
        <button class="preset-btn" data-preset="tips" onclick="applyPreset('tips')" title="টিপস"><i class="fas fa-star"></i> টিপস</button>
      </div>

      <!-- IMAGE PREVIEW -->
      <div id="image-preview" class="image-preview" style="display:none"></div>

      <!-- INPUT -->
      <div class="ai-teacher-input-area">
        <form id="ai-teacher-form" autocomplete="off">
          <div class="input-wrapper">
            <button type="button" id="ai-teacher-voice" class="voice-btn" title="ভয়েস ইনপুট">
              <i class="fas fa-microphone"></i>
            </button>
            <button type="button" id="ai-teacher-image" class="voice-btn" title="ছবি সংযুক্ত করুন">
              <i class="fas fa-image"></i>
            </button>
            <input type="file" id="ai-teacher-image-input" accept="image/*" capture="environment" style="display:none">
            <textarea
              id="ai-teacher-input"
              placeholder="আপনার প্রশ্ন লিখুন... (Ctrl+K)"
              rows="1"
            ></textarea>
            <span id="char-count" class="char-count">0/2000</span>
          </div>
          <button type="submit" id="ai-teacher-send" disabled>
            <i class="fas fa-paper-plane"></i>
          </button>
        </form>
        <div class="input-footer">
          <span class="input-status"><i class="fas fa-keyboard"></i> Enter পাঠান · Shift+Enter নতুন লাইন · Ctrl+K ফোকাস</span>
        </div>
      </div>
    </div>
  </main>

  <!-- HISTORY PANEL -->
  <div id="history-overlay" class="history-overlay"></div>
  <div id="history-panel" class="history-panel">
    <div class="history-header">
      <div class="history-header-title">
        <i class="fas fa-clock-rotate"></i>
        <span>চ্যাট ইতিহাস</span>
        <span class="history-header-badge" id="history-count">0</span>
      </div>
      <button id="history-close" class="history-close-btn"><i class="fas fa-xmark"></i></button>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>

  <script>
    window.__MANUAL_ROOT_PATH__ = './';
  </script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/navigation.js"></script>
  <script src="auth.js"></script>
  <script src="js/ai-teacher.js"></script>
</body>
</html>
