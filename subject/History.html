        />

        <style>
            /* ইতিহাস পেজের জন্য নির্দিষ্ট থিম */
            :root {
                --text-color: #192335;
                --bg-light: #fdfaf6;
                --bg-white: #ffffff;
                --footer-bg: #0b172a;
                --footer-text: #a0b3d1;
            }
            body {
                font-family: "Baloo Da 2", cursive;
                background-color: var(--bg-light);
                margin: 0; color: var(--text-color); line-height: 1.6;
            }
            .container {
                max-width: 1200px; margin: 0 auto; padding: 0 15px;
            }
            .chapter-page {
                padding: 4rem 1rem;
            }
            .section-title {
                text-align: center; font-size: clamp(2rem, 5vw, 3rem); font-weight: 700;
                margin-bottom: 3rem;
                background: linear-gradient(45deg, #d35400, #8e44ad);
                -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                background-clip: text; text-fill-color: transparent;
            }
            .chapter-list {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 2rem;
            }
            .chapter-card {
                background: var(--bg-white); border-radius: 15px; padding: 2rem;
                text-align: center; font-size: 1.25rem; font-weight: 600;
                color: var(--text-color); text-decoration: none; border: 1px solid #f5e1da;
                transition: all 0.35s ease-in-out;
                box-shadow: 0 8px 24px rgba(149, 157, 165, 0.1);
                position: relative; overflow: hidden;
            }
            .chapter-card i {
                display: block; font-size: 2.5rem; margin-bottom: 1rem;
                transition: all 0.35s ease-in-out;
            }
            .chapter-list a:nth-child(1) i { color: #9c27b0; }
            .chapter-list a:nth-child(2) i { color: #ff9800; }
            .chapter-list a:nth-child(3) i { color: #2196f3; }
            .chapter-list a:nth-child(4) i { color: #607d8b; }
            .chapter-list a:nth-child(5) i { color: #795548; }
            .chapter-list a:nth-child(6) i { color: #4caf50; }
            .chapter-card:hover {
                transform: translateY(-10px); color: #fff;
                background-image: linear-gradient(45deg, #cb2d3e 0%, #ef473a 100%);
                box-shadow: 0 15px 35px rgba(239, 71, 58, 0.3);
            }
            .chapter-card:hover i {
                color: #fff; transform: scale(1.1) rotate(-5deg);
            }
            .footer {
                background: var(--footer-bg); text-align: center; color: var(--footer-text);
                padding: 2.5rem 1rem; margin-top: 4rem; border-top: 2px solid #cb2d3e;
            }
            /* ভিউ টগল বাটনের জন্য CSS */
            .header-action-btn {
                background: none; border: none; color: #333; font-size: 1.3rem;
                cursor: pointer; padding: 5px 8px; margin-left: 8px; transition: color 0.3s ease;
            }
            .header-action-btn:hover { color: #4a90e2; }
            .mobile-navigation-menu .toggle-view-btn i { margin-right: 12px; width: 20px; }
        </style>
    </head>
    <body>
        <main class="chapter-page">
            <div class="container">
                <h1 class="section-title">🏛️ ভারতের ইতিহাস - অধ্যায় তালিকা</h1>
                <div class="chapter-list">
                    <a href="subject/history-ch1.html" class="chapter-card"><i class="fas fa-landmark"></i> অধ্যায় ১: ইউরোপে জাতীয়তাবাদের উত্থান</a>
                    <a href="subject/history-ch2.html" class="chapter-card"><i class="fas fa-dharmachakra"></i> অধ্যায় ২: ভারতে জাতীয়তাবাদ</a>
                    <a href="subject/history-ch3.html" class="chapter-card"><i class="fas fa-globe-asia"></i> অধ্যায় ৩: বিশ্বায়িত বিশ্বের সৃষ্টি</a>
                    <a href="subject/history-ch4.html" class="chapter-card"><i class="fas fa-industry"></i> অধ্যায় ৪: শিল্পায়নের যুগ</a>
                    <a href="subject/history-ch5.html" class="chapter-card"><i class="fas fa-print"></i> অধ্যায় ৫: মুদ্রণ সংস্কৃতি ও আধুনিক বিশ্ব</a>
                    <a href="subject/chaya-porkashoni.html" class="chapter-card"><i class="fas fa-cogs"></i> ছায়া প্রকাশনী</a>
                </div>
            </div>
        </main>

        <footer class="footer">
            &copy; ২০২৫ | ইতিহাস বিভাগ | Study With Keshab
        </footer>

        <!-- Firebase এবং অন্যান্য স্ক্রিপ্ট -->
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
        <script src="auth.js"></script>        <script src="/js/firebase-config.js"></script>
        <script src="js/script.js"></script>

        <!-- এই পেজের জন্য নির্দিষ্ট এবং একত্রিত স্ক্রিপ্ট -->
        <script>
             // --- 1. Service Worker Registration ---
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('sw.js')
                        .then(reg => console.log('ServiceWorker registration successful.'))
                        .catch(err => console.log('ServiceWorker registration failed: ', err));
                });
            }

            document.addEventListener('DOMContentLoaded', () => {

                // --- 2. অথেন্টিকেশন এবং পেজ প্রোটেকশন লজিক ---
                const auth = firebase.auth();
                const guestLinksDesktop = document.getElementById('guest-link-desktop');
                const logoutLinkDesktop = document.getElementById('logout-link-desktop');
                const guestLinksMobile = document.getElementById('guest-link-mobile');
                const logoutLinkMobile = document.getElementById('logout-link-mobile');
                const userNameDisplay = document.getElementById('user-name-display');

                auth.onAuthStateChanged(user => {
                    if (!user) {
                        console.log("User not logged in. Redirecting...");
                        window.location.href = 'login.html';
                        return;
                    }
                    console.log("User is logged in:", user.displayName || user.email);
                    if (guestLinksDesktop) guestLinksDesktop.style.display = 'none';
                    if (logoutLinkDesktop) logoutLinkDesktop.style.display = 'list-item';
                    if (guestLinksMobile) guestLinksMobile.style.display = 'none';
                    if (logoutLinkMobile) logoutLinkMobile.style.display = 'list-item';
                    if (userNameDisplay) {
                       userNameDisplay.textContent = user.displayName ? user.displayName.split(' ')[0] : 'User';
                    }
                });

                const setupLogout = (buttonId) => {
                    const logoutBtn = document.getElementById(buttonId);
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            auth.signOut().then(() => {
                                console.log('User signed out.');
                                window.location.href = 'login.html';
                            }).catch(error => console.error('Sign out error', error));
                        });
                    }
                };
                setupLogout('logout-btn-desktop');
                setupLogout('logout-btn-mobile');

                // --- 3. ডেস্কটপ/মোবাইল মোড টগল লজিক ---
                const toggleBtns = document.querySelectorAll(".toggle-view-btn");
                const viewportMeta = document.getElementById("viewportMeta");
                let isDesktopView = localStorage.getItem("viewMode") === "desktop";

                function applyViewMode() {
                    const desktopBtn = document.querySelector(".header-action-btn.toggle-view-btn");
                    const mobileMenuText = document.querySelector(".toggle-view-text");
                    const allIcons = document.querySelectorAll(".toggle-view-btn .fas");
                    if (isDesktopView) {
                        viewportMeta.setAttribute("content", "width=1280");
                        if(desktopBtn) desktopBtn.title = "মোবাইল মোড";
                        if(mobileMenuText) mobileMenuText.textContent = "মোবাইল মোড";
                        allIcons.forEach(icon => {
                            icon.classList.remove("fa-desktop");
                            icon.classList.add("fa-mobile-alt");
                        });
                    } else {
                        viewportMeta.setAttribute("content", "width=device-width, initial-scale=1.0");
                        if(desktopBtn) desktopBtn.title = "ডেস্কটপ মোড";
                        if(mobileMenuText) mobileMenuText.textContent = "ডেস্কটপ মোড";
                        allIcons.forEach(icon => {
                            icon.classList.remove("fa-mobile-alt");
                            icon.classList.add("fa-desktop");
                        });
                    }
                }
                toggleBtns.forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        e.preventDefault();
                        isDesktopView = !isDesktopView;
                        localStorage.setItem("viewMode", isDesktopView ? "desktop" : "mobile");
                        applyViewMode();
                    });
                });
                applyViewMode();
            });
        </script>
    </body>
</html>
