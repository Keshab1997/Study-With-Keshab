<!doctype html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz | Study With Keshab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="../css/quiz_style.css" />
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            min-height: 100vh;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        body.day-mode {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .quiz-page-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
            height: 100vh;
            overflow: hidden;
        }
        
        .quiz-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            position: relative;
            flex-shrink: 0;
        }
        
        body.dark-mode .quiz-header {
            background: rgba(31, 41, 55, 0.95);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        #quiz-title {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }
        
        body.dark-mode #quiz-title {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .score-board span {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.05);
        }
        
        body.dark-mode .score-board span {
            background: rgba(255, 255, 255, 0.1);
        }
        
        #correct-count { color: #10b981; }
        #wrong-count { color: #ef4444; }
        #timer { color: #8b5cf6; }
        
        .mode-toggle-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .mode-toggle-btn:hover {
            transform: scale(1.1) rotate(15deg);
        }
        
        body.dark-mode .mode-toggle-btn {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
        }
        
        #quiz-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: clamp(20px, 3vh, 35px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        body.dark-mode #quiz-container {
            background: rgba(31, 41, 55, 0.95);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            color: #f3f4f6;
        }
        
        .page-navigation {
            margin-top: 15px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .page-navigation .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.95);
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .page-navigation .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        body.dark-mode .page-navigation .btn {
            background: rgba(31, 41, 55, 0.95);
            color: #60a5fa;
        }
        
        /* Custom Scrollbar - Remove since no scroll needed */
        
        @media (max-width: 768px) {
            .quiz-page-container { padding: 10px; }
            .quiz-header { padding: 15px 20px; margin-bottom: 15px; }
            #quiz-title { font-size: 1.2rem; }
            #quiz-container { padding: 15px; }
            .score-board { gap: 12px; }
            .score-board span { font-size: 0.9rem; padding: 6px 12px; }
            .mode-toggle-btn { width: 35px; height: 35px; font-size: 1rem; top: 12px; right: 12px; }
        }
        
        @media (max-width: 480px) {
            .quiz-page-container { padding: 8px; }
            .quiz-header { padding: 12px 15px; }
            #quiz-title { font-size: 1.1rem; }
            #quiz-container { padding: 15px; }
        }
    </style>
</head>
<body class="day-mode">
    <main class="quiz-page-container">
        <header class="quiz-header">
            <h1 id="quiz-title">লোড হচ্ছে...</h1>
            <div class="score-board">
                <span id="correct-count">✔️ 0</span>
                <span id="wrong-count">❌ 0</span>
                <span id="timer">⏱️ 00:00</span>
            </div>
            <button id="mode-toggle" class="mode-toggle-btn"><i class="fas fa-moon"></i></button>
        </header>

        <div id="quiz-container">
            <!-- কুইজ কন্টেন্ট এখানে লোড হবে -->
        </div>

        <div class="page-navigation">
            <a href="../index.html" class="btn btn-primary"><i class="fas fa-home"></i> হোম</a>
        </div>
    </main>

    <script src="../js/quiz_script.js"></script>
    <script src="../js/quiz-renderer.js"></script>
</body>
</html>
